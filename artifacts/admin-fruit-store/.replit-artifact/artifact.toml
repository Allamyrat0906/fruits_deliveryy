kind = "web"
previewPath = "/admin-fruit-store/"
title = "Панель администратора"
version = "1.0.0"
id = "artifacts/admin-fruit-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin-fruit-store/" ]
localPort = 21528

[services.development]
run = "pnpm --filter @workspace/admin-fruit-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-fruit-store", "run", "build" ]
publicDir = "artifacts/admin-fruit-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21528"
BASE_PATH = "/admin-fruit-store/"
